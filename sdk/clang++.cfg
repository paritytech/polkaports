--target=riscv64-unknown-none-elf
-march=rv64emac_zbb_xtheadcondmov
-mabi=lp64e
-fpic
-fPIE
-fno-exceptions
-fno-rtti
-mrelax
-nostdinc
-nostartfiles
--sysroot=<CFGDIR>
-D_GNU_SOURCE
-isysroot <CFGDIR>
-isystem <CFGDIR>/include/c++/v1
-isystem <CFGDIR>/include
-Wl,-L<CFGDIR>/lib
-Wl,--emit-relocs
-Wl,--no-relax
-Wl,-lc++
-Wl,-lc++abi
-Wl,-lclang_rt.builtins-riscv64
-Wl,<CFGDIR>/lib/Scrt1.o
-Wl,<CFGDIR>/lib/crti.o
-Wl,<CFGDIR>/lib/crtn.o
