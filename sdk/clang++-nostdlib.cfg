--target=riscv64-unknown-none-elf
-march=rv64emac_zbb_xtheadcondmov
-mabi=lp64e
-fpic
-fPIE
-fno-exceptions
-fno-rtti
-mrelax
-nostdinc
-nostartfiles
--sysroot=<CFGDIR>
-isysroot <CFGDIR>
-isystem <CFGDIR>/include/c++/v1
-isystem <CFGDIR>/include
-Wl,-L<CFGDIR>/lib
-Wl,--emit-relocs
-Wl,--no-relax
-Wl,-lclang_rt.builtins-riscv64
