name: CI

on:
  # Run CI on push only for 'main' branch
  push:
    branches: [main]
    tags:
      - "v*"
  # Run CI on pull request for all branches
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Check Rust crates
    timeout-minutes: 10
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install nightly
        run: rustup toolchain install --profile minimal --component rustfmt nightly
      - name: Install rustfmt, clippy
        run: rustup component add clippy
      - name: Run fmt, clippy, tests
        run: ./ci/rust.sh

  setup-linux:
    name: Run setup script on Linux
    timeout-minutes: 20
    runs-on: ubuntu-24.04
    env:
      TOOLS_RUST_TARGET: x86_64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install dependencies
        run: ./ci/apt.sh
      - name: Install rust-src
        run: |
          rustup component add rust-src
          rustup target add x86_64-unknown-linux-musl
          rustup default stable
      - name: Check that setup script works
        run: ./setup.sh
      - name: Check that our tools work
        run: ./ci/apps.sh
      - name: Create distribution archive
        run: ./ci/dist.sh
      - name: Upload archives as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-archives
          path: |
            sysroot-Linux-riscv64emac.tar.zst
            tools-Linux-x86_64.tar.zst
          compression-level: 0
          if-no-files-found: error
          retention-days: 1

  setup-macos:
    name: Run setup script on MacOS
    timeout-minutes: 20
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install dependencies
        run: ./ci/brew.sh
      - name: Install rust-src
        run: rustup component add rust-src
      - name: Check that setup script works
        run: ./setup.sh
      - name: Check that our tools work
        run: ./ci/apps.sh
      - name: Create distribution archive
        run: ./ci/dist.sh
      - name: Upload archives as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-archives
          path: |
            sysroot-Darwin-riscv64emac.tar.zst
            tools-Darwin-arm64.tar.zst
          compression-level: 0
          if-no-files-found: error
          retention-days: 1

  check-macos:
    name: Check that sysroot produced on Linux works on MacOS
    timeout-minutes: 20
    runs-on: macos-15
    needs: [setup-linux, setup-macos]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install dependencies
        run: ./ci/brew.sh
      - name: Install rust-src
        run: rustup component add rust-src
      - name: Download Linux sysroot
        uses: actions/download-artifact@v5
        with:
          name: linux-archives
      - name: Download MacOS archives
        uses: actions/download-artifact@v5
        with:
          name: macos-archives
      - name: Unpack Linux sysroot and MacOS tools
        run: |
          ls -l
          mkdir -p sysroot/bin
          tar -C sysroot -xf sysroot-Linux-riscv64emac.tar.zst
          tar -C sysroot/bin -xf tools-Darwin-arm64.tar.zst
      - name: Build apps
        run: ./ci/apps.sh

  create-release:
    name: Create binary release
    timeout-minutes: 20
    runs-on: ubuntu-24.04
    needs: [check-macos]
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - name: Download Linux archives
        uses: actions/download-artifact@v5
        with:
          name: linux-archives
      - name: Download MacOS archives
        uses: actions/download-artifact@v5
        with:
          name: macos-archives
      - name: Rename archives
        run: |
          ls -l
          mv sysroot-Linux-riscv64emac.tar.zst sysroot-${{ env.VERSION }}-Linux-riscv64emac.tar.zst
          mv sysroot-Darwin-riscv64emac.tar.zst sysroot-${{ env.VERSION }}-Darwin-riscv64emac.tar.zst
          mv tools-Linux-x86_64.tar.zst tools-${{ env.VERSION }}-Linux-x86_64.tar.zst
          mv tools-Darwin-arm64.tar.zst tools-${{ env.VERSION }}-Darwin-arm64.tar.zst
      - name: Create release
        uses: actions/create-release@v1
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.VERSION }}
          release_name: Release ${{ env.VERSION }}
          draft: true
          prerelease: false
      - name: Upload system root (Linux)
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: sysroot-${{ env.VERSION }}-Linux-riscv64emac.tar.zst
          asset_name: sysroot-${{ env.VERSION }}-Linux-riscv64emac.tar.zst
          asset_content_type: application/zstd
      - name: Upload system root (Darwin)
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: sysroot-${{ env.VERSION }}-Darwin-riscv64emac.tar.zst
          asset_name: sysroot-${{ env.VERSION }}-Darwin-riscv64emac.tar.zst
          asset_content_type: application/zstd
      - name: Upload tools-Linux-x86_64.tar.zst
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: tools-${{ env.VERSION }}-Linux-x86_64.tar.zst
          asset_name: tools-${{ env.VERSION }}-Linux-x86_64.tar.zst
          asset_content_type: application/zstd
      - name: Upload tools-Darwin-arm64.tar.zst
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: tools-${{ env.VERSION }}-Darwin-arm64.tar.zst
          asset_name: tools-${{ env.VERSION }}-Darwin-arm64.tar.zst
          asset_content_type: application/zstd
